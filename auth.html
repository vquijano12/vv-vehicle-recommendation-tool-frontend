<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Vehicle Recommendation Tool</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Visionary Vortex</h1>
        <p>Vehicle Recommendation Tool</p>
      </div>

      <div class="auth-tabs">
        <button id="loginTab" class="tab-button active">Login</button>
        <button id="registerTab" class="tab-button">Register</button>
      </div>

      <form id="loginForm" class="auth-form">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Log in to continue to the application.</p>

        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" />

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />

        <button type="submit" class="auth-submit">Login</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <h2>Create Account</h2>
        <p class="form-subtitle">Register to save preferences and favorites.</p>

        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" placeholder="Enter your full name" />

        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="Enter your email" />

        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" placeholder="Create a password" />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" />

        <button type="submit" class="auth-submit">Register</button>
      </form>

      <p id="authMessage" class="auth-message"></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
