<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Vehicle Recommendation Tool</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Visionary Vortex</h1>
        <p>Vehicle Recommendation Tool</p>
      </div>

      <div class="auth-tabs">
        <button id="loginTab" class="tab-button active" type="button">Login</button>
        <button id="registerTab" class="tab-button" type="button">Register</button>
      </div>

      <form id="loginForm" class="auth-form">
        <h2>Welcome Back</h2>
        <p class="form-subtitle">Log in to continue and access your recommendations.</p>

        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" />

        <label for="loginPassword">Password</label>

        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Enter your password" />
        
          <span class="toggle-password" onclick="togglePassword('loginPassword', this)">
            
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/>
            </svg>
        
            <svg class="eye-off-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M2 5l17 17m-2.5-2.5C15.2 20.3 13.7 21 12 21c-7 0-11-7-11-7 1.3-2.3 3.2-4.2 5.5-5.5m3.1-1.2C10.5 7.1 11.2 7 12 7c7 0 11 7 11 7-1.1 2-2.6 3.7-4.5 5M12 9c1.7 0 3 1.3 3 3 0 .5-.1.9-.3 1.3"/>
            </svg>
        
          </span>
        </div>

        <button type="submit" class="auth-submit">Login</button>

        <p class="forgot-password" id="forgotPasswordBtn">
          Forgot password?
        </p>

      </form>

      <form id="registerForm" class="auth-form hidden">
        <h2>Create Account</h2>
        <p class="form-subtitle">Create an account to view and save your recommendations.</p>

        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" placeholder="Enter your full name" />

        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="Enter your email" />

        <label for="registerPassword" class="password-label">
          Password
          <span class="info-wrapper">
            <span class="info-icon">i</span>
            <span class="password-tooltip">
              Password must be at least 8 characters and include:
              uppercase, lowercase, number and symbol.
            </span>
          </span>
        </label>
        
        <div class="password-wrapper">
          <input type="password" id="registerPassword" placeholder="Create a password" />
        
          <span class="toggle-password" onclick="togglePassword('registerPassword', this)">
            
            <!-- Eye (visible) -->
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/>
            </svg>
        
            <!-- Eye Slash (hidden) -->
            <svg class="eye-off-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M2 5l17 17m-2.5-2.5C15.2 20.3 13.7 21 12 21c-7 0-11-7-11-7 1.3-2.3 3.2-4.2 5.5-5.5m3.1-1.2C10.5 7.1 11.2 7 12 7c7 0 11 7 11 7-1.1 2-2.6 3.7-4.5 5M12 9c1.7 0 3 1.3 3 3 0 .5-.1.9-.3 1.3"/>
            </svg>
        
          </span>
        </div>


        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" />

        <button type="submit" class="auth-submit">Register</button>
      </form>

      <form id="confirmForm" class="auth-form hidden">
        <h2>Confirm Account</h2>
        <p class="form-subtitle">Enter the verification code sent to your email.</p>

        <label for="confirmEmail">Email</label>
        <input type="email" id="confirmEmail" placeholder="Enter your email" />

        <label for="confirmCode">Verification Code</label>
        <input type="text" id="confirmCode" placeholder="Enter verification code" />

        <button type="submit" class="auth-submit">Confirm Account</button>
      </form>

      <p id="authMessage" class="auth-message"></p>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
