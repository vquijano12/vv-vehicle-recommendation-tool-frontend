<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Recommendation Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <header class="hero">
        <div class="hero-content">
          <h1>Vehicle Recommendation Tool</h1>
          <p>
            Enter your preferences to receive personalized vehicle recommendations
            based on your needs and priorities.
          </p>
        </div>
      </header>

      <main class="container">
        <section class="card">
          <h2>Enter Your Preferences</h2>
          <form id="vehicleForm">
            <div class="form-grid">
      
            </div>
      
            <div class="button-row">
              <button type="submit">Generate Recommendations</button>
              <button type="reset" class="secondary-btn">Clear Form</button>
            </div>
          </form>
        </section>
      </main>



  <script src="script.js"></script>
</body>
</html>
